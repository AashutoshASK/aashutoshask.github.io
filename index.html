<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    padding: 50px;
    overflow: hidden;
}

h1 {
    color: #fff;
    font-size: 28px;
}

.btn {
    padding: 12px 25px;
    margin: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.yes {
    background-color: #28a745;
    color: white;
}

.no {
    background-color: #dc3545;
    color: white;
    position: relative;
}

#message {
    margin-top: 30px;
    font-size: 24px;
    color: white;
}

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>
Shwetali ❤️<br><br>
On this auspicious Ram Navami 🙏,<br>
will you promise to walk with me forever…<br>
with love, trust & endless smiles? 🥺
</h1>

<button id="yesBtn" class="btn yes" onclick="yesClicked()">YES ❤️</button>
<button id="noBtn" class="btn no">NO</button>

<div id="message"></div>

<!-- Your uploaded music -->
<audio id="bgMusic">
    <source src="romantic.mp3.mp3" type="audio/mpeg">
</audio>

<audio id="cuteSound">
    <source src="cute.mp3" type="audio/mpeg">
</audio>

<script>
let answered = false;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("bgMusic");
const cuteSound = document.getElementById("cuteSound");

// YES CLICK ❤️
function yesClicked() {
    if (answered) return;
    answered = true;

    // play YOUR uploaded music here 🎵
    music.currentTime = 0;
    music.play().catch(() => {});

    document.body.style.background = "#000";

    document.getElementById("message").innerHTML =
        "💖 Thank you my love! On this Ram Navami, we promise to always stay together ❤️<br>Love you.. Jai Shriram 🙏";

    // hearts animation
    for (let i = 0; i < 80; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 30 + 10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);
    }
}

// 😄 RUNNING NO BUTTON
noBtn.addEventListener("mouseover", () => {

    // cute sound (optional)
    if (cuteSound) {
        cuteSound.currentTime = 0;
        cuteSound.play().catch(() => {});
    }

    // move button randomly
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // grow YES button
    let size = window.getComputedStyle(yesBtn).fontSize;
    size = parseFloat(size);
    yesBtn.style.fontSize = (size + 3) + "px";

    // fun text
    const texts = ["No 😜", "Are you sure? 😏", "Think again 😄", "Not allowed ❤️"];
    noBtn.innerText = texts[Math.floor(Math.random() * texts.length)];
});
</script>

</body>
</html>
